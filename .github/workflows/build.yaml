name: Build
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_publish:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Output version of rust being used
        run: rustup --version

      # TODO: Remove duplication between this and build_publish_executable.yml
      - name: Install system dependencies
        # sequoia-openpgp requires nettle to build
        run: sudo apt install clang llvm pkg-config nettle-dev

      - name: Build
        run: cargo build --release --all-features
