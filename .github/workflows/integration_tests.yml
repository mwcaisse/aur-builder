name: Integration Tests
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_publish:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Output version of rust being used
        run: rustup --version

      - name: Install system dependencies
        uses: ./.github/actions/install-system-dependencies

      # TODO: This need to run on an archlinux container with  aur-utils installed
      - name: Run integration tests
        run: cargo test --test '*'