name: Ensure Github Actions are up to date

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OUT_OF_DATE_ACTIONS_COMMENT_MARKER: <!-- actions-dist-out-of-date-comment -->

jobs:

  check-changes:
    name: Check for action changes
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read

    outputs:
      actions: ${{ steps.filter.outputs.actions }}

    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            actions:
               - .github/actions/determine-version-and-tags/*
  

  check-dist:
    name: Ensure changed actions are built
    runs-on: ubuntu-latest

    needs: check-changes
    if: ${{ needs.check-changes.outputs.actions == 'true' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .github/actions/determine-version-and-tags/package-lock.json

      - name: Install dependencies
        working-directory: .github/actions/determine-version-and-tags
        run: npm ci

      - name: Build action
        working-directory: .github/actions/determine-version-and-tags
        run: npm run build

      - name: Check for uncommitted dist changes
        id: distcheck
        run: |
          if git diff --exit-code -- .github/actions/determine-version-and-tags/dist/index.js; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "::error::.github/actions/determine-version-and-tags/dist/index.js is out of date. Run npm run build and commit the updated dist file."
            exit 1
          fi

      - name: Check for existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: ${{ env.OUT_OF_DATE_ACTIONS_COMMENT_MARKER }}

      - name: Add or update comment
        uses: peter-evans/create-or-update-comment@v3
        if: failure() && steps.distcheck.outputs.up_to_date == 'false'
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: |
            ${{ env.OUT_OF_DATE_ACTIONS_COMMENT_MARKER }}
             ⚠️ **`.github/actions/determine-version-and-tags/dist/index.js` is out of date.**
            
            Please run:
            
            ```bash
            cd .github/actions/determine-version-and-tags
            npm run build
            ```
            
            Then commit the updated `dist/index.js`.

      # If the action was updated, delete the comment
      - name: Delete comment on success
        uses: detomarco/delete-comment@7d743e576ec2cde9bf90c79792ed959428d7e7d1
        if: success() && steps.distcheck.outputs.up_to_date == 'true' && steps.find-comment.outputs.comment-id != ''
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}



