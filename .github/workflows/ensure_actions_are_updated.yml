name: Ensure Github Actions are up to date

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  check-changes:
    name: Check for action changes
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read

    outputs:
      actions: ${{ steps.filter.outputs.actions }}

    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            actions:
               - .github/actions/determine-version-and-tags/*
  

  check-dist:
    name: Ensure changed actions are built
    runs-on: ubuntu-latest

    needs: check-changes
    if: ${{ needs.check-changes.outputs.actions == 'true' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .github/actions/determine-version-and-tags/package-lock.json

      - name: Install dependencies
        working-directory: .github/actions/determine-version-and-tags
        run: npm ci

      - name: Build action
        working-directory: .github/actions/determine-version-and-tags
        run: npm run build

      - name: Check for uncommitted dist changes
        id: distcheck
        run: |
          if git diff --exit-code -- .github/actions/determine-version-and-tags/dist/index.js; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "::error::.github/actions/determine-version-and-tags/dist/index.js is out of date. Run npm run build and commit the updated dist file."
            exit 1
          fi

      - name: Find existing comment
        if: failure() && steps.distcheck.outputs.up_to_date == 'false'
        uses: actions/github-script@v7
        id: find-comment
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const marker = '<!-- dist-out-of-date-comment -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: number,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            core.setOutput('comment_id', existing ? String(existing.id) : '');

      - name: Add or update PR comment
        if: failure() && steps.distcheck.outputs.up_to_date == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const marker = '<!-- dist-out-of-date-comment -->';
            const body = `${marker}
            
            ⚠️ **\`.github/actions/determine-version-and-tags/dist/index.js\` is out of date.**
            
            Please run:
            
            \`\`\`bash
            cd .github/actions/determine-version-and-tags
            npm run build
            \`\`\`
            
            Then commit the updated \`dist/index.js\`.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: number,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body,
              });
            }